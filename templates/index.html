<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-to-Telegram Dashboard</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            display: flex;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .video-card { flex: 1.2; padding: 20px; align-items: center; }
        .chat-card { flex: 1; height: 600px; }
        .chat-header {
            background: #0f172a;
            padding: 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; white-space: pre-line; }
        .msg.bot { background: #1e293b; color: #f8fafc; align-self: flex-start; border: 1px dashed #475569; border-bottom-left-radius: 4px; }
        .msg.user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-input-area { padding: 15px; background: #0f172a; border-top: 1px solid #334155; display: flex; gap: 10px; }
        input { flex: 1; background: #1e293b; border: 1px solid #475569; border-radius: 8px; padding: 12px; color: white; outline: none; }
        button { background: #2563eb; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .camera-feed { width: 100%; max-width: 480px; border-radius: 8px; border: 2px solid #334155; margin-top: 15px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="card video-card">
        <h2>🎥 Live Thermal View</h2>
        <img class="camera-feed" src="/video_feed">
    </div>

    <div class="card chat-card">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="status-dot"></div>
                <div>
                    <h2 style="margin:0; font-size:16px;">Telegram Bridge</h2>
                    <small style="color: #94a3b8;">Direct Device Link</small>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="chatbox"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type a message or command ('analyze', 'capture', 'temp')..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    async function fetchMessages() {
        try {
            const r = await fetch('/get_messages');
            const data = await r.json();
            const chatbox = document.getElementById('chatbox');
            
            chatbox.innerHTML = '';
            data.history.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${msg.sender}`;
                msgDiv.innerHTML = msg.text;
                chatbox.appendChild(msgDiv);
            });
            chatbox.scrollTop = chatbox.scrollHeight;
        } catch(e) {}
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        
        input.value = '';
        await fetch('/send_message', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: text })
        });
        fetchMessages();
    }

    setInterval(fetchMessages, 1000);
    fetchMessages();
</script>

</body>
</html>
